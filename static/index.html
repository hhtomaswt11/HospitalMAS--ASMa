<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hospital MAS - Patient Flow Dashboard</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&family=JetBrains+Mono:wght@400;500&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --bg-deep: #020617;
            --bg-surface: rgba(15, 23, 42, 0.6);
            --bg-wing: rgba(30, 41, 59, 0.4);
            --border: rgba(255, 255, 255, 0.08);
            --text: #f1f5f9;
            --text-muted: #94a3b8;
            --primary: #3b82f6;
            --secondary: #8b5cf6;
            --success: #10b981;
            --error: #ef4444;
            --warning: #f59e0b;
            --accent-cyan: #06b6d4;
            --accent-pink: #d946ef;
        }

        * {
            box-sizing: border-box;
        }

        body {
            font-family: 'Outfit', sans-serif;
            background-color: var(--bg-deep);
            color: var(--text);
            margin: 0;
            padding: 1rem 2rem;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            background-image:
                radial-gradient(circle at 10% 10%, rgba(59, 130, 246, 0.05) 0%, transparent 40%),
                radial-gradient(circle at 90% 90%, rgba(139, 92, 246, 0.05) 0%, transparent 40%);
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1.5rem;
            padding: 1rem 2rem;
            background: var(--bg-surface);
            backdrop-filter: blur(20px);
            border: 1px solid var(--border);
            border-radius: 1rem;
        }

        .brand h1 {
            font-size: 1.5rem;
            margin: 0;
            font-weight: 700;
            background: linear-gradient(to right, #60a5fa, #a855f7);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        /* Main Layout: 3 Columns */
        .main-layout {
            display: grid;
            grid-template-columns: 320px 1fr 320px;
            gap: 2rem;
            flex-grow: 1;
            overflow: hidden;
        }

        .lounge-panel {
            background: var(--bg-surface);
            border: 1px solid var(--border);
            border-radius: 1.5rem;
            padding: 1.5rem;
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .panel-title {
            font-size: 0.8rem;
            font-weight: 700;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.1em;
            margin-bottom: 0.5rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .entity-list {
            display: flex;
            flex-direction: column;
            gap: 1rem;
            overflow-y: auto;
            padding: 0.5rem;
        }

        /* Hospital Map (Center) */
        .hospital-core {
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
            overflow-y: auto;
            padding-right: 0.5rem;
        }

        .wing {
            background: var(--bg-wing);
            border: 1px solid var(--border);
            border-radius: 1.5rem;
            padding: 1.5rem;
            position: relative;
        }

        .wing-title {
            position: absolute;
            top: 0.2rem;
            left: 1.5rem;
            padding: 0.1rem 0.75rem;
            background: var(--bg-deep);
            border: 1px solid var(--border);
            border-radius: 1rem;
            font-size: 0.65rem;
            font-weight: 600;
            color: var(--text-muted);
        }

        .rooms-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(400px, 1fr));
            gap: 1.5rem;
        }

        /* Entity Avatars */
        .entity-card {
            background: rgba(15, 23, 42, 0.4);
            border: 1px solid var(--border);
            border-radius: 0.75rem;
            padding: 0.75rem;
            display: flex;
            align-items: center;
            gap: 1rem;
            transition: all 0.3s ease;
            width: 100%;
            height: 100%;
        }

        .avatar {
            width: 40px;
            height: 40px;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }

        .avatar-medic {
            background: linear-gradient(135deg, #3b82f6, #1d4ed8);
            color: white;
        }

        .avatar-patient {
            background: linear-gradient(135deg, #a855f7, #7e22ce);
            color: white;
        }

        .avatar-emergency {
            background: linear-gradient(135deg, #ef4444, #b91c1c);
            color: white;
        }

        .entity-info {
            line-height: 1.2;
        }

        .entity-name {
            font-weight: 600;
            font-size: 0.9rem;
            margin-bottom: 0.1rem;
        }

        .entity-type {
            font-size: 0.65rem;
            color: var(--text-muted);
            text-transform: uppercase;
        }

        /* Room Component */
        .room {
            background: rgba(2, 6, 23, 0.4);
            border: 1px solid var(--border);
            border-radius: 1rem;
            padding: 1rem;
            display: flex;
            flex-direction: column;
            gap: 0.75rem;
            min-height: 140px;
        }

        .room-header {
            display: flex;
            justify-content: space-between;
            font-weight: 600;
            font-size: 0.8rem;
        }

        .room-slots {
            display: flex;
            justify-content: space-around;
            align-items: center;
            background: rgba(0, 0, 0, 0.2);
            border-radius: 0.75rem;
            padding: 0.75rem;
            flex-grow: 1;
        }

        .slot {
            width: 180px;
            height: 70px;
            border: 1px dashed rgba(255, 255, 255, 0.05);
            background: rgba(0, 0, 0, 0.1);
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: hidden;
        }

        .slot::before {
            content: attr(data-label);
            position: absolute;
            top: -12px;
            font-size: 0.5rem;
            color: var(--text-muted);
            text-transform: uppercase;
        }

        /* Logs & Console at the bottom */
        footer {
            height: 120px;
            margin-top: 1.5rem;
            background: var(--bg-surface);
            border: 1px solid var(--border);
            border-radius: 1rem;
            padding: 0.75rem 1.5rem;
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.75rem;
            overflow-y: auto;
        }

        .log-entry {
            margin-bottom: 0.25rem;
            opacity: 0.7;
        }
    </style>
</head>

<body>

    <header>
        <div class="brand">
            <h1>Hospital Multi-Agent System</h1>
        </div>
        <div style="display: flex; gap: 1.5rem; font-size: 0.8rem; color: var(--text-muted);">
            <div>STATUS: <span style="color: var(--success); font-weight: 700;">CONNECTED</span></div>
            <div>DASHBOARD: <span style="color: var(--primary); font-weight: 700;">REAL-TIME FLOW</span></div>
        </div>
    </header>

    <div class="main-layout">
        <!-- Waiting Lounge -->
        <aside class="lounge-panel">
            <div class="panel-title">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M19 21v-2a4 4 0 0 0-4-4H9a4 4 0 0 0-4 4v2" />
                    <circle cx="12" cy="7" r="4" />
                </svg>
                Sala de Espera
            </div>
            <div class="entity-list" id="lounge-patients">
                <!-- Waiting Patients -->
            </div>
        </aside>

        <!-- Hospital Map -->
        <main class="hospital-core">
            <section class="wing">
                <div class="wing-title">Consultórios</div>
                <div class="rooms-grid" id="wing-primary">
                    <!-- Standard Consultation Rooms -->
                </div>
            </section>

            <section class="wing">
                <div class="wing-title">Salas de Exames</div>
                <div class="rooms-grid" id="wing-specialized">
                    <!-- specialized Rooms -->
                </div>
            </section>

            <section class="wing">
                <div class="wing-title">Blocos Operatórios</div>
                <div class="rooms-grid" id="wing-surgical">
                    <!-- Surgical Units -->
                </div>
            </section>
        </main>

        <!-- Staff Registry -->
        <aside class="lounge-panel">
            <div class="panel-title">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M4.8 2.3A.3.3 0 1 0 5 2.8l2-1.5A.3.3 0 1 0 6.7.8L4.8 2.3Z" />
                    <path d="M16 2a2 2 0 0 0-2 2v2a2 2 0 0 0 2 2h2a2 2 0 0 0 2-2V4a2 2 0 0 0-2-2h-2Z" />
                    <path d="M11 14a3 3 0 1 0-6 0 3 3 0 0 0 6 0Z" />
                    <rect width="18" height="18" x="3" y="3" rx="2" ry="2" />
                </svg>
                Médicos Disponíveis
            </div>
            <div class="entity-list" id="staff-medics">
                <!-- Available Medics -->
            </div>
        </aside>
    </div>

    <footer>
        <div id="log-container"></div>
    </footer>

    <script>
        const ICONS = {
            medic: '<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4.8 2.3A.3.3 0 1 0 5 2.8l2-1.5A.3.3 0 1 0 6.7.8L4.8 2.3Z"/><path d="M16 2a2 2 0 0 0-2 2v2a2 2 0 0 0 2 2h2a2 2 0 0 0 2-2V4a2 2 0 0 0-2-2h-2Z"/><path d="M11 14a3 3 0 1 0-6 0 3 3 0 0 0 6 0Z"/></svg>',
            patient: '<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 21v-2a4 4 0 0 0-4-4H9a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>',
        };

        // Dynamic Registry of Hospital Entities (Fetched from API)
        let ENTITIES = {
            medics: {},
            rooms: {},
            patients: {}
        };

        const loungePatients = document.getElementById('lounge-patients');
        const staffMedics = document.getElementById('staff-medics');
        const wingPrimary = document.getElementById('wing-primary');
        const wingSpecialized = document.getElementById('wing-specialized');
        const wingSurgical = document.getElementById('wing-surgical');
        const logContainer = document.getElementById('log-container');

        async function update() {
            try {
                const res = await fetch('/api/state');
                const data = await res.json();

                // Update registry from API if available
                if (data.registry) {
                    ENTITIES = { medics: {}, rooms: {}, patients: {} };
                    Object.keys(data.registry).forEach(jid => {
                        const info = data.registry[jid];
                        if (info.role === 'medic') ENTITIES.medics[jid] = info;
                        else if (info.role === 'room') ENTITIES.rooms[jid] = info;
                        else if (info.role === 'patient') ENTITIES.patients[jid] = info;
                    });
                }

                renderFlow(data);
            } catch (e) { console.error(e); }
        }

        function createEntityEntry(jid, info, type) {
            const isEmergency = info.type === "Urgência" || jid.includes("urgente");
            return `
                <div class="entity-card" id="card-${jid.split('@')[0]}">
                    <div class="avatar ${type === 'medic' ? 'avatar-medic' : (isEmergency ? 'avatar-emergency' : 'avatar-patient')}">
                        ${type === 'medic' ? ICONS.medic : ICONS.patient}
                    </div>
                    <div class="entity-info">
                        <div class="entity-name">${info.name || jid.split('@')[0]}</div>
                        <div class="entity-type">${info.type || (type === 'medic' ? 'Profissional' : 'S/ Ref')}</div>
                    </div>
                </div>
            `;
        }

        function renderFlow(data) {
            const resources = data.resources || {};
            const logs = data.logs || [];

            // Tracking who is currently in a room
            const inRoomPatients = new Set();
            const inRoomMedics = new Set();

            // 1. Render Rooms and identify active agents
            const roomsHtml = { primary: '', specialized: '', surgical: '' };

            Object.keys(ENTITIES.rooms).forEach(roomJid => {
                const roomInfo = ENTITIES.rooms[roomJid];
                const roomState = resources[roomJid] || { disponivel: true };

                const isOccupied = !roomState.disponivel;
                const patientJid = roomState.paciente_atual;

                let patientHtml = '';
                let medicHtml = '';

                if (isOccupied && patientJid) {
                    inRoomPatients.add(patientJid);
                    const pInfo = ENTITIES.patients[patientJid] || { name: patientJid.split('@')[0], type: "Externo" };
                    patientHtml = createEntityEntry(patientJid, pInfo, 'patient');

                    // Look for the medic assigned to this patient (strictly filter by role)
                    Object.keys(resources).forEach(mJid => {
                        if (resources[mJid].paciente_atual === patientJid && ENTITIES.medics[mJid]) {
                            inRoomMedics.add(mJid);
                            const mInfo = ENTITIES.medics[mJid];
                            medicHtml = createEntityEntry(mJid, mInfo, 'medic');
                        }
                    });
                }

                const html = `
                    <div class="room ${patientJid && patientJid.includes('urgente') ? 'emergency-high' : ''}">
                        <div class="room-header">
                            <span>${roomInfo.name}</span>
                            <span style="color:${isOccupied ? 'var(--error)' : 'var(--success)'}">${isOccupied ? 'OCUPADA' : 'LIVRE'}</span>
                        </div>
                        <div class="room-slots">
                            <div class="slot" data-label="Paciente">${patientHtml}</div>
                            <div style="font-size: 0.7rem; color: var(--text-muted); opacity: 0.5;">●</div>
                            <div class="slot" data-label="Médico">${medicHtml}</div>
                        </div>
                    </div>
                `;
                roomsHtml[roomInfo.wing] += html;
            });

            wingPrimary.innerHTML = roomsHtml.primary;
            wingSpecialized.innerHTML = roomsHtml.specialized;
            wingSurgical.innerHTML = roomsHtml.surgical;

            // 2. Render Lounge (Patients NOT in rooms)
            let loungeHtml = '';
            Object.keys(ENTITIES.patients).forEach(pJid => {
                // If patient exists in resources (has arrived) but is NOT currently in a room
                if (resources[pJid] && !inRoomPatients.has(pJid)) {
                    loungeHtml += createEntityEntry(pJid, ENTITIES.patients[pJid], 'patient');
                }
            });
            loungePatients.innerHTML = loungeHtml;

            // 3. Render Staff On-Call (Medics NOT in rooms)
            let staffHtml = '';
            Object.keys(ENTITIES.medics).forEach(mJid => {
                if (!inRoomMedics.has(mJid)) {
                    staffHtml += createEntityEntry(mJid, ENTITIES.medics[mJid], 'medic');
                }
            });
            staffMedics.innerHTML = staffHtml;

            // 4. Render Logs
            if (logs.length > 0) {
                logContainer.innerHTML = logs.slice(-5).map(l => `
                    <div class="log-entry">
                        <span style="color:var(--text-muted)">[${l.time}]</span> 
                        <span style="color:var(--primary)">[${l.agent}]</span> ${l.message}
                    </div>
                `).join('');
            }
        }

        setInterval(update, 500);
        update();
    </script>
</body>

</html>
